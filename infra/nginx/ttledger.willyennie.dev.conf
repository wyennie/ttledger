# Nginx vhost for ttledger.willyennie.dev.
# Install at /etc/nginx/sites-available/ttledger.willyennie.dev,
# symlink into /etc/nginx/sites-enabled/, then `sudo nginx -t && sudo systemctl reload nginx`.
#
# Cloudflare-fronted: this vhost terminates SSL with a Cloudflare Origin
# Certificate (free, *.willyennie.dev wildcard, 15-year validity, signed by
# Cloudflare's CA). Cloudflare SSL/TLS mode "Full" or "Full (strict)" both
# work — strict validates the cert against Cloudflare's CA.
#
# Setup once on the droplet:
#   sudo nano /etc/ssl/cloudflare-origin.crt           # paste cert (chmod 644)
#   sudo nano /etc/ssl/private/cloudflare-origin.key   # paste key  (chmod 600)

upstream ttledger {
  server 127.0.0.1:3001;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# Plain HTTP — Cloudflare in "Full" connects on 443 only, but keep this so
# direct-IP probes or future Let's Encrypt HTTP-01 challenges work.
server {
  listen 80;
  listen [::]:80;
  server_name ttledger.willyennie.dev;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name ttledger.willyennie.dev;

  ssl_certificate     /etc/ssl/cloudflare-origin.crt;
  ssl_certificate_key /etc/ssl/private/cloudflare-origin.key;

  client_max_body_size 25M;

  # ActionCable / Turbo Streams need WebSocket upgrade headers.
  location /cable {
    proxy_pass http://ttledger;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  location / {
    proxy_pass http://ttledger;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_redirect off;
  }
}
