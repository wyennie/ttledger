# Nginx vhost for ttledger.willyennie.dev.
# Install at /etc/nginx/sites-available/ttledger.willyennie.dev,
# symlink into /etc/nginx/sites-enabled/, then run `sudo certbot --nginx -d ttledger.willyennie.dev`
# to add SSL and an HTTP->HTTPS redirect (certbot rewrites this file in place).

upstream ttledger {
  server 127.0.0.1:3001;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  listen [::]:80;
  server_name ttledger.willyennie.dev;

  client_max_body_size 25M;

  # ActionCable / Turbo Streams need WebSocket upgrade headers.
  location /cable {
    proxy_pass http://ttledger;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  location / {
    proxy_pass http://ttledger;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_redirect off;
  }
}
