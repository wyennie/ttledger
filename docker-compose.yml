services:
  web:
    image: ghcr.io/wyennie/ttledger:${TAG:-latest}
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:80"
    env_file: .env
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgresql://ttledger:${POSTGRES_PASSWORD}@db:5432/ttledger_production
      SOLID_QUEUE_IN_PUMA: "true"
    volumes:
      - ttledger_storage:/rails/storage

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ttledger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ttledger_production
    volumes:
      - ttledger_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttledger -d ttledger_production"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ttledger_storage:
  ttledger_pgdata:
